<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <!-- 다크모드 토글 -->
    <button id="btnTheme" class="theme-toggle" title="테마 전환">
      <span class="theme-icon">&#9728;&#65039;</span>
    </button>

    <!-- 히어로 섹션 -->
    <header class="hero">
      <div class="hero-logo">
        <img src="icons/icon128.png" alt="Q" class="hero-logo-img">
      </div>
      <h1 class="hero-title">지식인 답변 생성기</h1>
      <p class="hero-sub">Developed by 화창하다</p>
    </header>

    <div class="divider"></div>

    <!-- 상품 선택 섹션 -->
    <section class="card">
      <div class="card-header">내 상품 목록</div>
      <div id="productChips" class="product-chips"></div>
      <div class="product-chips-empty hidden" id="emptyMsg">저장된 상품이 없습니다</div>
    </section>

    <!-- 답변 생성 -->
    <section class="card">
      <button id="btnGenerate" class="btn btn-accent btn-full">답변 생성하기</button>
      <div id="generateStatus" class="status-msg hidden"></div>
      <div id="answerArea" class="answer-area hidden">
        <div class="answer-label">생성된 답변</div>
        <div id="answerText" class="answer-text"></div>
        <div class="answer-actions">
          <button id="btnCopy" class="btn btn-secondary">복사하기</button>
          <button id="btnRegenerate" class="btn btn-secondary">재생성</button>
        </div>
      </div>
      <div id="generateError" class="error-msg hidden"></div>
    </section>

    <!-- 상품 추가/수정 (접이식) -->
    <section class="card">
      <button id="btnToggleForm" class="btn btn-secondary btn-full">+ 상품 추가</button>
      <div id="productForm" class="product-form hidden">
        <div class="form-group">
          <label for="productName">제품명</label>
          <input type="text" id="productName" placeholder="예: 헤르포진 립밤">
        </div>
        <div class="form-group">
          <label for="productLink">상품 링크 URL (참고용)</label>
          <input type="url" id="productLink" placeholder="https://smartstore.naver.com/...">
        </div>
        <div class="form-group">
          <label for="productFeatures">상품 특장점</label>
          <textarea id="productFeatures" rows="3" placeholder="상품의 주요 특장점을 입력하세요..."></textarea>
        </div>
        <div class="form-actions">
          <button id="btnSaveProduct" class="btn btn-primary">저장</button>
          <button id="btnDeleteProduct" class="btn btn-danger hidden">삭제</button>
          <button id="btnCancelEdit" class="btn btn-secondary">취소</button>
        </div>
      </div>
    </section>

    <!-- API 키 설정 -->
    <section class="card card-settings">
      <div class="card-header">Gemini API Key</div>
      <div class="api-row">
        <input type="password" id="apiKey" placeholder="API 키를 입력하세요">
        <button id="btnSaveApi" class="btn btn-save">저장</button>
      </div>
      <div id="apiStatus" class="success-msg hidden">API 키가 저장되어 있습니다</div>
    </section>

    <!-- 푸터 -->
    <footer class="footer">
      <div class="footer-divider"></div>
      <p class="footer-text">지식인 답변 생성기</p>
      <p class="footer-powered">Developed by 화창하다</p>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
